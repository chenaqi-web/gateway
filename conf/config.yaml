server:
  addr: "127.0.0.1:8079"
  mode: release

Log:
  Level: "debug"
  # console=仅终端彩色 | file=仅文件JSON
  Mode: "console"
  Filename: "logs/gateway.log"

rpc:
  core_server_addr: "127.0.0.1:8081"
  request_timeout: 5

http:
  agent_server_addr: "http://127.0.0.1:8080"
  request_timeout: 30

Mysql:
  Host: "127.0.0.1"
  Port: "3306"
  username: "root"
  password: "123456"
  dbname: "renai"
  config: "charset=utf8mb4&parseTime=True&loc=Local"
  Max_Idle_Conn: 10
  Max_Open_Conn: 100

Redis:
  Host: "127.0.0.1"
  Port: "6379"
  username: "root"
  password: ""
  db: 0

llm:
  # provider: ollama | zhipu
  provider: ollama
  api_url: "http://localhost:11434"
  model_id: "llama3.2"
  model_name: "Llama 3.2"
  # zhipu example:
  # provider: zhipu
  # api_key: "your-zhipu-api-key"
  # api_url: "https://open.bigmodel.cn/api/paas/v4/"
  # model_id: "glm-4-flash"
  # model_name: "GLM-4-Flash"

ai_chat:
  vector_collection: "test_knowledge"
  default_top_k: 5
